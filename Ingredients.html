<!DOCTYPE html>
<html lang="en-us">


<!------title ideas: we have food at home, databake, scrappysupper, pantry-eat yo self, food at home, recipeasy, we are so cooked, -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Ingredient Based Recipes </title>
  <!-- Latest compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Latest compiled JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">   </script>
  
  <link rel="stylesheet" href="https://use.typekit.net/xle2koj.css">
  <link rel="stylesheet" href="Ingredients.css">


  <script>
  let count = 0;
  function addIngredient() {
    if (count % 3 == 0) {
      let newRow = document.createElement('div');
      newRow.classList.add('row');
      newRow.id = "currRow";
      document.getElementById("ingredientList").append(newRow);
    } 
    let newIng = document.createElement("div");
    newIng.classList.add("col-sm-3", "ing");
    newIng.innerHTML = "New Ingredient " + count;
    document.getElementById("currRow").append(newIng);
    let newIngConfirm = document.createElement("p");
    newIngConfirm.innerHTML = "New Ingredient " + count + " added";
    document.getElementById("ingBody").append(newIngConfirm);
    count++;
  }

  function clearIng() {
    document.getElementById("ingBody").textContent = '';
  }
  </script>

</head>
<body>


<div class="container-fluid">
  <h1>Ingredient Recipes App Name</h1>

</div>

<div class="container-fluid">

<div class="row">
<div class="col-sm-3 pantry d-grid h-75">

<!---------------------------PANTRY----------------------------------->
  <h3> Pantry </h3>
  <button type="button" class="btn btn-success btn-add-item" data-bs-toggle="offcanvas" data-bs-target="#addIngOffCan">Add Ingredient</button>
  <br>
  <div>
  <div id="ingredientList">
  </div>


<!------ADD NEW INGREDIENT---->
<div class="offcanvas offcanvas-start pantry" id="addIngOffCan">
  <div class="offcanvas-header">
    <h1 class="offcanvas-title">Add Ingredients</h1>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" onclick="clearIng()"></button>
  </div>
  <div class="offcanvas-body">
    <form> 
    <div class="row">
    <div class="col-sm-8">
      <label for="ingredient" class="form-label">Enter Ingredient:</label>
      <input type="text" name="newIngToAdd" class="form-control" id="newIngredient">
      
    </div>
    <div class="col-sm-3">
      <br>
      <button type="button" class="btn btn-success" onclick="addIngredient()">Submit</button>
    </div>
    </div>
  </form>
  <div id="ingBody"> </div>
  </div>
</div>

  
<!------END OF ADDING INGREDIENT----->
</div>
</div>


<div class="col-sm-6 recipes">
<!----------------------------RECIPES--------------------------------->
  <h3> Recipes </h3>
  <input type="text" class="form-control rec-input" placeholder="Search">

  <div class="row"> 
    <div class="col-sm rec">
      <img src="omelette.jpg" alt="omelette" >
      <p> recipe 1 </p>
    </div>
    <div class="col-sm rec">
      <img src="potato.jpg" alt="baked potato" >
      <p> recipe 2 </p>
    </div>
    <div class="col-sm rec">
    <img src="steak.jpg" alt="steak on plate" >
    <p> recipe 3 </p>
    </div>
  </div>
  <div class="row"> 
    <div class="col-sm rec">
      <img src="omelette.jpg" alt="omelette" >
      <p> recipe 4 </p>
    </div>
    <div class="col-sm rec">
      <img src="potato.jpg" alt="baked potato" >
      <p> recipe 5 </p>
    </div>
    <div class="col-sm rec">
    <img src="steak.jpg" alt="steak on plate" >
    <p> recipe 6 </p>
    </div>
  </div>
  

</div>
</div>
</div>


</body>
</html>
